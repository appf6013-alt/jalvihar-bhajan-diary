<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🙏 Jalvihar Bhajan Diary</title>
    <style>
        body { 
            font-family: system-ui, sans-serif; 
            background: #0a0f1c; 
            color: #e2e8f0; 
            margin: 0; 
            padding: 10px; 
        }
        h1 { 
            text-align: center; 
            color: #67e8f9; 
            margin: 20px 0; 
        }
        .song-card { 
            background: #1e2937; 
            margin: 15px 0; 
            padding: 20px; 
            border-radius: 12px; 
        }
        .song-title { 
            color: #67e8f9; 
            font-size: 1.4rem; 
            margin-bottom: 12px; 
        }
        .lyrics { 
            white-space: pre-wrap; 
            line-height: 1.8; 
            font-size: 1.05rem; 
        }
        button { 
            padding: 10px 15px; 
            margin: 8px 5px 0 0; 
            border-radius: 8px; 
            background: #334155; 
            color: white; 
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #475569;
        }
        .controls {
            text-align: center;
            margin: 15px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .search-box {
            position: relative;
            width: 85%;
            max-width: 500px;
        }
        #searchInput {
            width: 100%;
            padding: 12px 45px 12px 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e2937;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .mic-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0;
            margin: 0;
        }
        .mic-listening {
            animation: pulse 1s infinite;
            color: #ef4444;
        }
        @keyframes pulse {
            0% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-50%) scale(1.2); }
            100% { transform: translateY(-50%) scale(1); }
        }
    </style>
</head>
<body>
    <h1>🙏 Jalvihar Bhajan Diary</h1>
    
    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 सर्च करें (हिंदी या English में)..." onkeyup="filterSongs()">
            <button class="mic-btn" id="micBtn" onclick="startVoiceSearch()" title="बोलकर सर्च करें">🎙️</button>
        </div>
    </div>

    <div id="songsContainer"></div>

    <script>
        let songs = [];

        // व्हाट्सएप (हिंग्लिश) अक्षरों को हिंदी स्वर/व्यंजन के बुनियादी साउंड से मैच करने की डिक्शनरी
        const hinglishMap = {
            'a': '[अाा]', 'b': 'ब', 'c': '[चक]', 'd': '[दडध]', 'e': '[एे]', 'f': 'फ', 'g': 'ग', 'h': 'ह', 
            'i': '[इीिी]', 'j': 'ज', 'k': 'क', 'l': 'ल', 'm': 'म', 'n': '[नणंग]', 'o': '[ओो]', 'p': 'प', 
            'q': 'क', 'r': '[रड़]', 's': '[सशष]', 't': '[तटथठ]', 'u': '[उूुू]', 'v': '[वब]', 'w': 'व', 
            'x': 'क्स', 'y': 'य', 'z': 'ज', 'sh': 'श', 'ch': 'च', 'kh': 'ख', 'gh': 'घ', 'bh': 'भ', 'dh': 'ध'
        };

        async function loadSongs() {
            try {
                // टेस्टिंग के लिए अगर फाइल न मिले तो डमी डेटा लोड होगा ताकि ऐप क्रैश न हो
                const res = await fetch('lyrics_backup.txt');
                const text = await res.text();
                parseSongs(text);
                renderSongs();
            } catch(e) {
                console.log("lyrics_backup.txt नहीं मिली, डमी डेटा लोड हो रहा है।");
                // डेमो के लिए कुछ भजन:
                parseSongs("श्री कृष्ण गोविंद हरे मुरारी\nहे नाथ नारायण वासुदेवा\n---\nहनुमान चालीसा\nजय हनुमान ज्ञान गुन सागर\nजय कपीस तिहुं लोक उजागर");
                renderSongs();
            }
        }

        function parseSongs(text) {
            songs = [];
            const blocks = text.split('---');
            blocks.forEach(block => {
                const lines = block.trim().split('\n');
                if (lines.length > 0) {
                    const title = lines[0].trim();
                    if (title) {
                        const lyrics = lines.slice(1).join('\n').trim();
                        songs.push({
                            title: title,
                            lyrics: lyrics || "Lyrics उपलब्ध नहीं"
                        });
                    }
                }
            });
        }

        function renderSongs(filtered = songs) {
            const container = document.getElementById('songsContainer');
            container.innerHTML = '';

            if(filtered.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#94a3b8;">कोई भजन नहीं मिला...</p>';
                return;
            }

            filtered.forEach(song => {
                const div = document.createElement('div');
                div.className = 'song-card';
                div.innerHTML = `
                    <h3 class="song-title">${song.title}</h3>
                    <div class="lyrics">${song.lyrics}</div>
                    <button onclick="copyLyrics('${song.title.replace(/'/g,"\\'")}')">📋 Copy Lyrics</button>
                `;
                container.appendChild(div);
            });
        }

        function copyLyrics(title) {
            const song = songs.find(s => s.title === title);
            if (song) {
                navigator.clipboard.writeText(song.lyrics);
                alert("✅ Lyrics Copy हो गया!");
            }
        }

        // हिंग्लिश टेक्स्ट को रेगुलर एक्सप्रेशन (Regex) में बदलने का फंक्शन
        function convertHinglishToRegex(term) {
            let regexStr = "";
            let i = 0;
            while (i < term.length) {
                // दो अक्षरों वाले साउंड्स को पहले चेक करें (जैसे sh, ch, kh)
                if (i + 1 < term.length && hinglishMap[term.substr(i, 2)]) {
                    regexStr += hinglishMap[term.substr(i, 2)];
                    i += 2;
                } else if (hinglishMap[term[i]]) {
                    regexStr += hinglishMap[term[i]];
                    i++;
                } else {
                    regexStr += term[i];
                    i++;
                }
            }
            return new RegExp(regexStr, 'i');
        }

        function filterSongs() {
            const term = document.getElementById('searchInput').value.trim().toLowerCase();
            
            if (!term) {
                renderSongs(songs);
                return;
            }

            // चेक करें कि यूजर इंग्लिश/व्हाट्सएप लैंग्वेज में टाइप कर रहा है या हिंदी में
            const isEnglish = /^[a-zA-Z\s]+$/.test(term);

            const filtered = songs.filter(song => {
                if (isEnglish) {
                    // व्हाट्सएप लैंग्वेज सर्च लॉजिक
                    const pattern = convertHinglishToRegex(term);
                    return pattern.test(song.title) || pattern.test(song.lyrics);
                } else {
                    // डायरेक्ट हिंदी सर्च लॉजिक
                    return song.title.toLowerCase().includes(term) || song.lyrics.toLowerCase().includes(term);
                }
            });

            renderSongs(filtered);
        }

        // 🎙️ वॉइस सर्च फंक्शन (Web Speech API)
        function startVoiceSearch() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                alert("माफ कीजिए, आपका ब्राउज़र वॉइस सर्च सपोर्ट नहीं करता है। Google Chrome या Edge का उपयोग करें।");
                return;
            }

            const recognition = new SpeechRecognition();
            const micBtn = document.getElementById('micBtn');
            const searchInput = document.getElementById('searchInput');

            // भाषा को हिंदी और इंग्लिश दोनों मिक्स (हिंग्लिश) समझने के लिए 'hi-IN' सेट किया है
            recognition.lang = 'hi-IN'; 
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                micBtn.classList.add('mic-listening');
                searchInput.placeholder = "बोलिए, मैं सुन रहा हूँ...";
            };

            recognition.onerror = (event) => {
                console.error(event.error);
                micBtn.classList.remove('mic-listening');
                searchInput.placeholder = "🔍 सर्च करें (हिंदी या English में)...";
            };

            recognition.onend = () => {
                micBtn.classList.remove('mic-listening');
                searchInput.placeholder = "🔍 सर्च करें (हिंदी या English में)...";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                searchInput.value = transcript;
                filterSongs(); // सर्च फंक्शन को तुरंत ट्रिगर करें
            };

            recognition.start();
        }

        window.onload = loadSongs;
    </script>
</body>
</html>
