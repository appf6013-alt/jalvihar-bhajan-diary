<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Jalvihar Bhajan Diary</title>
    <style>
        :root {
            --bg-color: #0b1120;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-cyan: #22d3ee;
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --pulse-red: #ef4444;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: radial-gradient(circle at top, #1e293b 0%, var(--bg-color) 100%);
            color: var(--text-main); 
            margin: 0; 
            padding: 16px; 
            min-height: 100vh;
        }

        h1 { 
            text-align: center; 
            color: #ffffff; 
            margin: 30px 0 5px 0; 
            font-size: 2.2rem;
            text-shadow: 0 0 15px rgba(34, 211, 238, 0.6);
            font-weight: 800;
        }

        .subtitle {
            text-align: center;
            color: var(--accent-cyan);
            margin-bottom: 25px;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 550px;
            background: rgba(15, 23, 42, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 4px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        /* 🎙️ माइक चालू होने पर पूरा सर्च बार लाल चमकेगा */
        .search-box.listening-mode {
            border-color: var(--pulse-red) !important;
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.5) !important;
        }

        #searchInput {
            width: 100%;
            padding: 14px 20px;
            border: none;
            background: transparent;
            color: var(--text-main);
            font-size: 1.1rem;
            outline: none;
        }

        .mic-btn {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 4px;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .mic-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .mic-btn.listening {
            background: var(--pulse-red) !important;
            animation: pulse-ring 1s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* 🔴 स्क्रीन के बीच में दिखने वाला वॉइस प्रॉम्ट */
        .voice-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 17, 32, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .voice-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid var(--pulse-red);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
        }

        .voice-wave {
            width: 60px; height: 60px;
            background: var(--pulse-red);
            border-radius: 50%;
            margin: 0 auto 20px auto;
            animation: wave 1.2s infinite;
        }

        @keyframes wave {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }

        #songsContainer { max-width: 700px; margin: 0 auto; }

        .song-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(12px);
            margin-bottom: 20px; 
            padding: 24px; 
            border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .song-title { color: var(--accent-cyan); font-size: 1.4rem; margin: 0 0 14px 0; font-weight: 600; }

        .lyrics { 
            white-space: pre-wrap; line-height: 1.8; font-size: 1.1rem; color: #cbd5e1;
            background: rgba(15, 23, 42, 0.4); padding: 15px; border-radius: 8px;
            border-left: 4px solid var(--accent-blue);
        }

        .copy-btn { 
            padding: 10px 18px; margin-top: 15px; border-radius: 8px; 
            background: rgba(51, 65, 85, 0.5); color: var(--text-main); 
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
        }

        .status-msg { text-align: center; color: var(--text-muted); margin-top: 40px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <h1>🙏 Jalvihar Bhajan Diary</h1>
    <div class="subtitle">खोजें अपनी पसंदीदा आरती और भजन</div>
    
    <div class="controls">
        <div class="search-box" id="searchBoxBlock">
            <input type="text" id="searchInput" placeholder="🔍 टाइप करें (e.g. kalyug, hanuman, dev)..." oninput="filterSongs()">
            <button class="mic-btn" id="micBtn" onclick="startVoiceSearch()" title="बोलकर सर्च करें">
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.42 2.72 6.23 6 6.72V21h2v-3.28c3.28-.49 6-3.3 6-6.72h-1.7z"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="voice-overlay" id="voiceOverlay">
        <div class="voice-card">
            <div class="voice-wave"></div>
            <h2 style="margin:0 0 10px 0; color:white;">🎙️ मैं सुन रहा हूँ...</h2>
            <p style="color:#94a3b8; margin:0;" id="voiceStatusText">भजन का नाम बोलिए</p>
            <button onclick="stopVoiceSearchManual()" style="margin-top:20px; padding:8px 16px; background:#ef4444; border:none; color:white; border-radius:5px; cursor:pointer;">बंद करें</button>
        </div>
    </div>

    <div id="songsContainer"></div>

    <script>
        let songs = [];

        // 🎯 100% फिक्स हिंग्लिश टू हिंदी डिक्शनरी (इसे आप और भी बढ़ा सकते हैं)
        const wordDictionary = {
            'kalyug': 'कलयुग', 'kaljug': 'कलयुग', 'kaliyug': 'कलयुग',
            'dev': 'देव', 'deb': 'देव',
            'siddha': 'सिद्ध', 'siddh': 'सिद्ध',
            'hanuman': 'हनुमान', 'hanman': 'हनुमान',
            'shree': 'श्री', 'shri': 'श्री',
            'krishna': 'कृष्ण', 'krisna': 'कृष्ण', 'kisna': 'कृष्ण',
            'govind': 'गोविंद', 'gobind': 'गोविंद',
            'hare': 'हरे', 'sheesh': 'शीश', 'shish': 'शीश',
            'khadau': 'खड़ाऊँ', 'khadaun': 'खड़ाऊँ',
            'ram': 'राम', 'bhakt': 'भक्त'
        };

        async function loadSongs() {
            try {
                const res = await fetch('lyrics_backup.txt');
                const text = await res.text();
                parseSongs(text);
                renderSongs();
            } catch(e) {
                // डमी बैकअप डेटा अगर फ़ाइल लोड न हो
                parseSongs("कलयुग में देव सिद्ध\nकलयुग में देव सिद्ध तुम हो हनुमान, संकट को हरने वाले दयानिधान।\n---\nश्री कृष्ण गोविंद हरे मुरारी\nहे नाथ नारायण वासुदेवा\n---\nशीश पर खड़ाऊँ अखियों में पानी\nशीश पर खड़ाऊँ, अखियों में पानी, राम भक्त लें चला रे, राम की निशानी ॥");
                renderSongs();
            }
        }

        function parseSongs(text) {
            songs = [];
            const blocks = text.split('---');
            blocks.forEach(block => {
                const lines = block.trim().split('\n');
                if (lines.length > 0) {
                    const title = lines[0].trim();
                    if (title) {
                        songs.push({
                            title: title,
                            lyrics: lines.slice(1).join('\n').trim() || "Lyrics उपलब्ध नहीं"
                        });
                    }
                }
            });
        }

        function renderSongs(filtered = songs) {
            const container = document.getElementById('songsContainer');
            container.innerHTML = '';

            if (filtered.length === 0) {
                container.innerHTML = '<div class="status-msg">कोई भजन नहीं मिला... कृपया दूसरा शब्द टाइप करें।</div>';
                return;
            }

            filtered.forEach(song => {
                const div = document.createElement('div');
                div.className = 'song-card';
                div.innerHTML = `
                    <h3 class="song-title">${song.title}</h3>
                    <div class="lyrics">${song.lyrics}</div>
                    <button class="copy-btn" onclick="copyLyrics('${song.title.replace(/'/g,"\\'")}')">📋 Copy Lyrics</button>
                `;
                container.appendChild(div);
            });
        }

        function copyLyrics(title) {
            const song = songs.find(s => s.title === title);
            if (song) {
                navigator.clipboard.writeText(song.lyrics);
                alert("✅ Lyrics Copy हो गया!");
            }
        }

        // 🚀 नया सुपर-फास्ट सर्च इंजन (हिंदी + डिक्शनरी बेस्ड हिंग्लिश)
        function filterSongs() {
            let term = document.getElementById('searchInput').value.trim().toLowerCase();
            
            if (!term) {
                renderSongs(songs);
                return;
            }

            // इनपुट के हर शब्द को चेक करें, अगर इंग्लिश वर्ड डिक्शनरी में है तो उसे हिंदी में बदलें
            let words = term.split(/\s+/);
            let processedWords = words.map(word => {
                return wordDictionary[word] || word; 
            });

            // बदला हुआ शुद्ध टेक्स्ट (जैसे "kalyug me" बन जाएगा "कलयुग me")
            let cleanTerm = processedWords.join(' ');

            const filtered = songs.filter(song => {
                const titleLower = song.title.toLowerCase();
                const lyricsLower = song.lyrics.toLowerCase();

                // 1. डायरेक्ट मैच चेक करें (चाहे इंग्लिश हो या हिंदी)
                if (titleLower.includes(term) || lyricsLower.includes(term)) return true;

                // 2. डिक्शनरी से कनवर्टेड हिंदी मैच चेक करें
                let matchCount = 0;
                processedWords.forEach(w => {
                    if (titleLower.includes(w) || lyricsLower.includes(w)) {
                        matchCount++;
                    }
                });

                // अगर सर्च किए गए शब्दों में से मुख्य शब्द मैच हो जाते हैं
                return matchCount > 0;
            });

            renderSongs(filtered);
        }

        // 🎙️ नया फुलप्रूफ वॉयस सर्च इंजन (लाइव विजुअल बॉक्स के साथ)
        let recognition;
        function startVoiceSearch() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                alert("आपका मोबाइल या ब्राउज़र बोलना सपोर्ट नहीं करता। कृपया Google Chrome ऐप का उपयोग करें।");
                return;
            }

            recognition = new SpeechRecognition();
            const micBtn = document.getElementById('micBtn');
            const searchBoxBlock = document.getElementById('searchBoxBlock');
            const voiceOverlay = document.getElementById('voiceOverlay');
            const voiceStatusText = document.getElementById('voiceStatusText');
            const searchInput = document.getElementById('searchInput');

            recognition.lang = 'hi-IN'; // हिंदी + हिंग्लिश मिक्स इनपुट पकड़ने के लिए बेस्ट
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                micBtn.classList.add('listening');
                searchBoxBlock.classList.add('listening-mode');
                voiceOverlay.style.display = 'flex'; // पूरी स्क्रीन पर वॉइस बॉक्स दिखाओ
                voiceStatusText.innerText = "साफ और ऊंचे स्वर में बोलिए...";
            };

            recognition.onerror = (event) => {
                console.error("माइक एरर:", event.error);
                if (event.error === 'not-allowed') {
                    voiceStatusText.innerHTML = "<span style='color:#ef4444;'>परमिशन ब्लॉक है!</span><br>कृपया ऊपर 🔒 (लॉक) आइकॉन पर क्लिक करके माइक Allow करें।";
                    setTimeout(stopVoiceSearchManual, 4000);
                } else {
                    voiceStatusText.innerText = "आवाज समझ नहीं आई, दोबारा कोशिश करें।";
                    setTimeout(stopVoiceSearchManual, 2000);
                }
            };

            recognition.onend = () => {
                // ऑटोमैटिक बंद होने पर केवल यूआई रीसेट करें
                micBtn.classList.remove('listening');
                searchBoxBlock.classList.remove('listening-mode');
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                searchInput.value = transcript;
                filterSongs(); // तुरंत सर्च ट्रिगर करें
                voiceStatusText.innerText = "मिल गया: " + transcript;
                setTimeout(stopVoiceSearchManual, 1000); // 1 सेकंड में बॉक्स बंद करें
            };

            try {
                recognition.start();
            } catch(e) {
                console.error(e);
            }
        }

        function stopVoiceSearchManual() {
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
            }
            document.getElementById('micBtn').classList.remove('listening');
            document.getElementById('searchBoxBlock').classList.remove('listening-mode');
            document.getElementById('voiceOverlay').style.display = 'none';
        }

        window.onload = loadSongs;
    </script>
</body>
</html>
