<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🙏 Jalvihar Bhajan Diary</title>
    <style>
        :root { --bg: #0a0f1c; --card: rgba(30, 41, 59, 0.95); --accent: #67e8f9; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0f1c, #1e2937);
            color: #e2e8f0;
            min-height: 100vh;
        }
        header {
            background: rgba(15, 23, 42, 0.95);
            padding: 1.2rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        h1 { font-size: 2.2rem; color: var(--accent); }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
        }
        input, button {
            padding: 12px 16px;
            border: none;
            border-radius: 50px;
            background: #1e2937;
            color: white;
        }
        .search-container { position: relative; width: 90%; max-width: 500px; }
        #searchInput { width: 100%; padding-right: 50px; }
        .voice-btn {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            background: #22d3ee; color: black; width: 45px; height: 45px; border-radius: 50%;
        }

        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .song-card {
            background: var(--card);
            margin: 15px 0;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .song-title { color: var(--accent); font-size: 1.45rem; margin-bottom: 12px; }
        .lyrics { white-space: pre-wrap; font-size: 1.05rem; line-height: 1.8; margin: 15px 0; }
        button { cursor: pointer; margin: 6px 4px 0 0; padding: 9px 16px; border-radius: 8px; }
    </style>
</head>
<body>
    <header>
        <h1>🙏 Jalvihar Bhajan Diary</h1>
        <div class="controls">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="🔍 गाना या lyrics सर्च करें..." onkeyup="filterSongs()">
                <button class="voice-btn" onclick="startVoiceSearch()">🎤</button>
            </div>
            <button onclick="showFavorites()">❤️ Favorites</button>
            <button onclick="adjustFont(2)">A+</button>
            <button onclick="adjustFont(-2)">A-</button>
        </div>
    </header>

    <div class="container" id="songsContainer"></div>

    <button onclick="showAdmin()" style="position:fixed; bottom:25px; right:25px; padding:16px 24px; background:#f97316; color:white; border:none; border-radius:50px; font-size:1.1rem;">
        ⚙️ Admin
    </button>

    <script>
        let songs = [];
        let favorites = [];
        let fontSize = 18;

        async function loadSongs() {
            try {
                const res = await fetch('lyrics_backup.txt');
                const text = await res.text();
                parseSongs(text);
                renderSongs();
            } catch(e) {
                alert("lyrics_backup.txt लोड नहीं हुई");
            }
        }

        function parseSongs(text) {
            const blocks = text.split('---');
            songs = [];
            blocks.forEach(block => {
                const lines = block.trim().split('\n');
                if (lines.length > 1) {
                    const title = lines[0].trim();
                    const lyrics = lines.slice(1).join('\n').trim();
                    if (title) songs.push({ title, lyrics });
                }
            });
        }

        function renderSongs(filtered = songs) {
            const container = document.getElementById('songsContainer');
            container.innerHTML = '';

            filtered.forEach(song => {
                const isFav = favorites.includes(song.title);
                const card = document.createElement('div');
                card.className = 'song-card';
                card.innerHTML = `
                    <h3 class="song-title">${song.title}</h3>
                    <div class="lyrics" style="font-size:\( {fontSize}px"> \){song.lyrics}</div>
                    <button onclick="toggleFavorite('\( {song.title.replace(/'/g,"\\'")}')"> \){isFav ? '❤️' : '♡'}</button>
                    <button onclick="copyLyrics('${song.title.replace(/'/g,"\\'")}')">📋 Copy</button>
                `;
                container.appendChild(card);
            });
        }

        function copyLyrics(title) {
            const song = songs.find(s => s.title === title);
            if (song) {
                navigator.clipboard.writeText(song.lyrics);
                alert("✅ Lyrics Copy हो गया!");
            }
        }

        function toggleFavorite(title) {
            if (favorites.includes(title)) {
                favorites = favorites.filter(t => t !== title);
            } else {
                favorites.push(title);
            }
            renderSongs();
        }

        function filterSongs() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!term) {
                renderSongs(songs);
                return;
            }
            const filtered = songs.filter(song => 
                song.title.toLowerCase().includes(term) || 
                song.lyrics.toLowerCase().includes(term)
            );
            renderSongs(filtered);
        }

        // Voice Search
        function startVoiceSearch() {
            if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
                alert("आपका ब्राउजर वॉइस सर्च सपोर्ट नहीं करता। Chrome में ट्राई करें।");
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'hi-IN';
            recognition.onresult = (event) => {
                document.getElementById('searchInput').value = event.results[0][0].transcript;
                filterSongs();
            };
            recognition.start();
        }

        function showFavorites() {
            const favSongs = songs.filter(s => favorites.includes(s.title));
            renderSongs(favSongs.length ? favSongs : songs);
        }
        function adjustFont(change) {
            fontSize = Math.max(14, Math.min(28, fontSize + change));
            renderSongs();
        }
        function showAdmin() {
            const pass = prompt("Admin Password:");
            if (pass === "admin123") alert("Admin Panel जल्दी आएगा");
            else alert("गलत पासवर्ड");
        }

        window.onload = loadSongs;
    </script>
</body>
</html>
