<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Jalvihar Bhajan Diary</title>
    <style>
        :root {
            --bg-color: #0b1120;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-cyan: #22d3ee;
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --pulse-red: #ef4444;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: radial-gradient(circle at top, #1e293b 0%, var(--bg-color) 100%);
            color: var(--text-main); 
            margin: 0; 
            padding: 16px; 
            min-height: 100vh;
        }

        h1 { 
            text-align: center; 
            color: #ffffff; 
            margin: 30px 0 5px 0; 
            font-size: 2.2rem;
            text-shadow: 0 0 15px rgba(34, 211, 238, 0.6);
            font-weight: 800;
        }

        .subtitle {
            text-align: center;
            color: var(--accent-cyan);
            margin-bottom: 25px;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 550px;
            background: rgba(15, 23, 42, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 4px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .search-box.listening-mode {
            border-color: var(--pulse-red) !important;
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.5) !important;
        }

        #searchInput {
            width: 100%;
            padding: 14px 20px;
            border: none;
            background: transparent;
            color: var(--text-main);
            font-size: 1.1rem;
            outline: none;
        }

        .mic-btn {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 4px;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .mic-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .mic-btn.listening {
            background: var(--pulse-red) !important;
            animation: pulse-ring 1s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .voice-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 17, 32, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .voice-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid var(--pulse-red);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
        }

        .voice-wave {
            width: 60px; height: 60px;
            background: var(--pulse-red);
            border-radius: 50%;
            margin: 0 auto 20px auto;
            animation: wave 1.2s infinite;
        }

        @keyframes wave {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }

        #songsContainer { max-width: 700px; margin: 0 auto; }

        .song-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(12px);
            margin-bottom: 20px; 
            padding: 24px; 
            border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .song-title { color: var(--accent-cyan); font-size: 1.4rem; margin: 0 0 14px 0; font-weight: 600; }

        .lyrics { 
            white-space: pre-wrap; line-height: 1.8; font-size: 1.1rem; color: #cbd5e1;
            background: rgba(15, 23, 42, 0.4); padding: 15px; border-radius: 8px;
            border-left: 4px solid var(--accent-blue);
        }

        .copy-btn { 
            padding: 10px 18px; margin-top: 15px; border-radius: 8px; 
            background: rgba(51, 65, 85, 0.5); color: var(--text-main); 
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
        }

        .status-msg { text-align: center; color: var(--text-muted); margin-top: 40px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <h1>🙏 Jalvihar Bhajan Diary</h1>
    <div class="subtitle">खोजें अपनी पसंदीदा आरती और भजन</div>
    
    <div class="controls">
        <div class="search-box" id="searchBoxBlock">
            <input type="text" id="searchInput" placeholder="🔍 टाइप करें (e.g. payo ji, kalyug, ram)..." oninput="filterSongs()">
            <button class="mic-btn" id="micBtn" onclick="startVoiceSearch()" title="बोलकर सर्च करें">
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.42 2.72 6.23 6 6.72V21h2v-3.28c3.28-.49 6-3.3 6-6.72h-1.7z"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="voice-overlay" id="voiceOverlay">
        <div class="voice-card">
            <div class="voice-wave"></div>
            <h2 style="margin:0 0 10px 0; color:white;">🎙️ मैं सुन रहा हूँ...</h2>
            <p style="color:#94a3b8; margin:0;" id="voiceStatusText">भजन का नाम बोलिए</p>
            <button onclick="stopVoiceSearchManual()" style="margin-top:20px; padding:8px 16px; background:#ef4444; border:none; color:white; border-radius:5px; cursor:pointer;">बंद करें</button>
        </div>
    </div>

    <div id="songsContainer"></div>

    <script>
        let songs = [];

        // 👑 यूनिवर्सल कैरेक्टर मैपिंग: यह अक्षरों के उच्चारण पर काम करता है, शब्दों पर नहीं!
        const charMap = {
            'sh': 'श', 'ch': 'च', 'kh': 'ख', 'gh': 'घ', 'bh': 'भ', 'dh': 'ध', 'th': 'थ', 'ph': 'फ', 'jh': 'झ', 'gy': 'ज्ञ',
            'a': 'अ', 'b': 'ब', 'c': 'क', 'd': 'द', 'e': 'ए', 'f': 'फ', 'g': 'ग', 'h': 'ह', 'i': 'इ', 'j': 'ज', 'k': 'क', 
            'l': 'ल', 'm': 'म', 'n': 'न', 'o': 'ओ', 'p': 'प', 'q': 'क', 'r': 'र', 's': 'स', 't': 'त', 'u': 'उ', 'v': 'व', 
            'w': 'व', 'x': 'क', 'y': 'य', 'z': 'ज'
        };

        // इंग्लिश टेक्स्ट (हिंग्लिश) को हिंदी के मूल ध्वनियों में बदलने वाला फंक्शन
        function convertToHindiSyllables(text) {
            let str = text.toLowerCase().replace(/[^a-z]/g, '');
            let converted = '';
            let i = 0;
            while (i < str.length) {
                if (i + 1 < str.length && charMap[str.substr(i, 2)]) {
                    converted += charMap[str.substr(i, 2)];
                    i += 2;
                } else if (charMap[str[i]]) {
                    converted += charMap[str[i]];
                    i++;
                } else {
                    i++;
                }
            }
            // मात्राओं और कमजोर अक्षरों को हटाना ताकि मैचिंग 100% सटीक हो
            return converted.replace(/[अाइईउऊएऐओऔािीुूेैोौ ं ँ ः ृ]/g, '')
                            .replace(/श|ष/g, 'स')
                            .replace(/ज/g, 'द')
                            .replace(/ड़|ढ़|ड|थ|ट/g, 'र');
        }

        // आपके भजनों के हिंदी टेक्स्ट को भी उसी मूल ध्वनि इंडेक्स में बदलना
        function convertHindiToSyllables(text) {
            return text.replace(/[ान ी ि ू ु े ै ो ौ ं ँ ः ृ]/g, '')
                       .replace(/[अआइईउऊएऐओऔ]/g, '')
                       .replace(/श|ष/g, 'स')
                       .replace(/ज/g, 'द')
                       .replace(/ड़|ढ़|ड|थ|ट/g, 'र');
        }

        async function loadSongs() {
            try {
                const res = await fetch('lyrics_backup.txt');
                const text = await res.text();
                parseSongs(text);
                renderSongs();
            } catch(e) {
                // डमी बैकअप डेटा ताकि आप बिना फाइल के भी तुरंत चलाकर देख सकें
                parseSongs("कलयुग में देव सिद्ध\nकलयुग में देव सिद्ध तुम हो हनुमान\n---\nपायो जी मैंने राम रतन धन पायो\nपायो जी मैंने राम रतन धन पायो, वस्तु अमोलिक दी मेरे सतगुरु");
                renderSongs();
            }
        }

        function parseSongs(text) {
            songs = [];
            const blocks = text.split('---');
            blocks.forEach(block => {
                const lines = block.trim().split('\n');
                if (lines.length > 0) {
                    const title = lines[0].trim();
                    if (title) {
                        const lyrics = lines.slice(1).join('\n').trim();
                        // भजनों का एक परमानेंट हिडन "साउंड इंडेक्स" बनाना
                        const searchIndex = convertHindiToSyllables((title + " " + lyrics).toLowerCase());
                        songs.push({
                            title: title,
                            lyrics: lyrics || "Lyrics उपलब्ध नहीं",
                            searchIndex: searchIndex
                        });
                    }
                }
            });
        }

        function renderSongs(filtered = songs) {
            const container = document.getElementById('songsContainer');
            container.innerHTML = '';

            if (filtered.length === 0) {
                container.innerHTML = '<div class="status-msg">कोई भजन नहीं मिला... कृपया दूसरा शब्द टाइप करें।</div>';
                return;
            }

            filtered.forEach(song => {
                const div = document.createElement('div');
                div.className = 'song-card';
                div.innerHTML = `
                    <h3 class="song-title">${song.title}</h3>
                    <div class="lyrics">${song.lyrics}</div>
                    <button class="copy-btn" onclick="copyLyrics('${song.title.replace(/'/g,"\\'")}')">📋 Copy Lyrics</button>
                `;
                container.appendChild(div);
            });
        }

        function copyLyrics(title) {
            const song = songs.find(s => s.title === title);
            if (song) {
                navigator.clipboard.writeText(song.lyrics);
                alert("✅ Lyrics Copy हो गया!");
            }
        }

        // 🚀 नया यूनिवर्सल सर्च फ़िल्टर (बिना किसी डिक्शनरी लिमिटेशन के)
        function filterSongs() {
            let term = document.getElementById('searchInput').value.trim().toLowerCase();
            
            if (!term) {
                renderSongs(songs);
                return;
            }

            const isEnglish = /^[a-zA-Z\s0-9]+$/.test(term);

            if (isEnglish) {
                // इनपुट किए गए हिंग्लिश शब्द को साउंड कोड में बदलें
                const searchSoundCode = convertToHindiSyllables(term);
                
                const filtered = songs.filter(song => {
                    // डायरेक्ट चेक या साउंड कोड मैच चेक
                    return song.title.toLowerCase().includes(term) || 
                           song.searchIndex.includes(searchSoundCode);
                });
                renderSongs(filtered);
            } else {
                // प्योर हिंदी सर्च
                const filtered = songs.filter(song => 
                    song.title.toLowerCase().includes(term) || 
                    song.lyrics.toLowerCase().includes(term)
                );
                renderSongs(filtered);
            }
        }

        // 🎙️ गिटहब पेजों के लिए पूरी तरह से री-राइट किया गया वॉयस सर्च
        let recognition;
        function startVoiceSearch() {
            // पुराने प्रॉम्ट्स को साफ़ करना
            stopVoiceSearchManual();

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("यह ब्राउज़र वॉयस सर्च सपोर्ट नहीं करता। कृपया Chrome ऐप का उपयोग करें।");
                return;
            }

            recognition = new SpeechRecognition();
            const micBtn = document.getElementById('micBtn');
            const searchBoxBlock = document.getElementById('searchBoxBlock');
            const voiceOverlay = document.getElementById('voiceOverlay');
            const voiceStatusText = document.getElementById('voiceStatusText');
            const searchInput = document.getElementById('searchInput');

            recognition.lang = 'hi-IN';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            // गिटहब की पॉलिसी को बाईपास करने के लिए यूजर क्लिक के तुरंत बाद इंटरफ़ेस दिखाना
            voiceOverlay.style.display = 'flex';
            micBtn.classList.add('listening');
            searchBoxBlock.classList.add('listening-mode');
            voiceStatusText.innerText = "सुन रहा हूँ... भजन का नाम बोलें";

            recognition.onstart = () => {
                console.log("माइक एक्टिवेटेड");
            };

            recognition.onerror = (event) => {
                console.error("माइक की समस्या:", event.error);
                if (event.error === 'not-allowed') {
                    voiceStatusText.innerHTML = "<span style='color:#ef4444; font-weight:bold;'>परमिशन ब्लॉक है!</span><br><br>कृपया अपने मोबाइल की सेटिंग्स में जाकर Chrome ऐप को Microphone की अनुमति दें, या ऊपर बने 🔒 लॉक आइकॉन पर क्लिक करें।";
                } else {
                    voiceStatusText.innerText = "आवाज साफ़ नहीं थी, कृपया दोबारा बटन दबाकर बोलें।";
                    setTimeout(stopVoiceSearchManual, 2500);
                }
            };

            recognition.onend = () => {
                micBtn.classList.remove('listening');
                searchBoxBlock.classList.remove('listening-mode');
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                searchInput.value = transcript;
                filterSongs(); // तुरंत सर्च शुरू करें
                voiceStatusText.innerText = "सर्च हो रहा है: " + transcript;
                setTimeout(stopVoiceSearchManual, 800);
            };

            try {
                recognition.start();
            } catch(e) {
                console.error("क्रैश बाईपास:", e);
                stopVoiceSearchManual();
            }
        }

        function stopVoiceSearchManual() {
            if (recognition) {
                try { recognition.abort(); } catch(e) {}
            }
            document.getElementById('micBtn').classList.remove('listening');
            document.getElementById('searchBoxBlock').classList.remove('listening-mode');
            document.getElementById('voiceOverlay').style.display = 'none';
        }

        window.onload = loadSongs;
    </script>
</body>
</html>
