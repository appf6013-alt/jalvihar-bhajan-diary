<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Jalvihar Bhajan Diary</title>
    <style>
        :root {
            --bg-color: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --accent-cyan: #06b6d4;
            --accent-blue: #3b82f6;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --pulse-red: #f43f5e;
            --heart-color: #ff2a5f;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, var(--bg-color) 70%);
            color: var(--text-main); 
            margin: 0; 
            padding: 20px 16px; 
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        h1 { 
            text-align: center; 
            color: #ffffff; 
            margin: 20px 0 5px 0; 
            font-size: 2.4rem;
            letter-spacing: -1px;
            background: linear-gradient(to right, #ffffff, #a5b4fc, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 35px;
            font-size: 1rem;
            font-weight: 500;
        }

        .controls {
            display: flex;
            justify-content: center;
            margin-bottom: 35px;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 550px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 6px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-box:focus-within {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.3), 0 20px 40px rgba(0, 0, 0, 0.7);
        }

        #searchInput {
            width: 100%;
            padding: 14px 16px;
            border: none;
            background: transparent;
            color: var(--text-main);
            font-size: 1.1rem;
            outline: none;
        }

        #searchInput::placeholder {
            color: #4b5563;
        }

        .mic-btn {
            background: linear-gradient(135deg, #1e40af, #0891b2);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.2);
        }

        .mic-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
        }

        .mic-btn svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        /* 🎙️ नया कीबोर्ड हेल्पर गाइड प्रॉम्ट */
        .voice-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 7, 18, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .voice-card {
            background: rgba(17, 24, 39, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px 25px;
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 85%;
            width: 320px;
        }

        .keyboard-icon-pulse {
            width: 65px; height: 65px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            border-radius: 50%;
            margin: 0 auto 20px auto;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
            animation: pulseGlow 1.5s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.5); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(6, 182, 212, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); }
        }

        #songsContainer { max-width: 650px; margin: 0 auto; }

        .song-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(16px);
            margin-bottom: 24px; 
            padding: 26px; 
            border-radius: 24px; 
            border: 1px solid var(--glass-border);
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .song-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .song-card.is-favorite-card {
            border-color: rgba(255, 42, 95, 0.3);
            background: linear-gradient(to bottom right, rgba(255, 42, 95, 0.05), var(--card-bg));
            box-shadow: 0 15px 35px rgba(255, 42, 95, 0.1);
        }

        .heart-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 42px;
            height: 42px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .heart-btn svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: var(--text-muted);
            stroke-width: 2.2;
            transition: all 0.3s ease;
        }

        .heart-btn.active svg {
            fill: var(--heart-color);
            stroke: var(--heart-color);
            filter: drop-shadow(0 0 8px rgba(255, 42, 95, 0.6));
        }

        .song-title { 
            color: #ffffff; 
            font-size: 1.45rem; 
            margin: 0 0 16px 0; 
            font-weight: 700; 
            max-width: 82%;
        }

        .lyrics { 
            white-space: pre-wrap; line-height: 1.9; font-size: 1.15rem; color: #e5e7eb;
            background: rgba(10, 15, 30, 0.6); padding: 20px; border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .copy-btn { 
            padding: 12px 22px; margin-top: 18px; border-radius: 14px; 
            background: rgba(255, 255, 255, 0.05); color: #ffffff; 
            border: 1px solid rgba(255,255,255,0.08); cursor: pointer;
            font-size: 0.95rem; font-weight: 600;
        }

        .status-msg { text-align: center; color: var(--text-muted); margin-top: 50px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <h1>🙏 Jalvihar Bhajan Diary</h1>
    <div class="subtitle">खोजें अपनी पसंदीदा आरती और भजन</div>
    
    <div class="controls">
        <div class="search-box" id="searchBoxBlock">
            <input type="text" id="searchInput" inputmode="text" placeholder="🔍 भजन का नाम यहाँ टाइप या बोलकर खोजें..." oninput="filterSongs()">
            <button class="mic-btn" id="micBtn" onclick="startFullproofVoice()" title="बोलकर सर्च करें">
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.42 2.72 6.23 6 6.72V21h2v-3.28c3.28-.49 6-3.3 6-6.72h-1.7z"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="voice-overlay" id="voiceOverlay" onclick="closeOverlay()">
        <div class="voice-card">
            <div class="keyboard-icon-pulse">🎙️</div>
            <h2 style="margin:0 0 12px 0; color:white; font-size: 1.4rem; font-weight:700;">कीबोर्ड माइक सक्रिय है</h2>
            <p style="color:var(--text-muted); margin:0; line-height: 1.6; font-size:1rem;">
                नीचे खुले हुए कीबोर्ड के **माइक आइकॉन (🎙️)** पर क्लिक करके भजन का नाम बोलें!
            </p>
            <button onclick="closeOverlay()" style="margin-top:25px; padding:12px 26px; background:linear-gradient(135deg, var(--accent-blue), var(--accent-cyan)); border:none; color:white; border-radius:14px; cursor:pointer; font-weight: 600; width: 100%;">ठीक है (बोलना शुरू करें)</button>
        </div>
    </div>

    <div id="songsContainer"></div>

    <script>
        let songs = [];
        let favorites = JSON.parse(localStorage.getItem('bhajan_favorites')) || [];

        const charMap = {
            'sh': 'श', 'ch': 'च', 'kh': 'ख', 'gh': 'घ', 'bh': 'भ', 'dh': 'ध', 'th': 'थ', 'ph': 'फ', 'jh': 'झ', 'gy': 'ज्ञ',
            'a': 'अ', 'b': 'ब', 'c': 'क', 'd': 'द', 'e': 'ए', 'f': 'फ', 'g': 'ग', 'h': 'ह', 'i': 'इ', 'j': 'ज', 'k': 'क', 
            'l': 'ल', 'm': 'म', 'n': 'न', 'o': 'ओ', 'p': 'प', 'q': 'क', 'r': 'र', 's': 'स', 't': 'त', 'u': 'उ', 'v': 'व', 
            'w': 'व', 'x': 'क', 'y': 'य', 'z': 'ज'
        };

        function convertToHindiSyllables(text) {
            let str = text.toLowerCase().replace(/[^a-z]/g, '');
            let converted = '';
            let i = 0;
            while (i < str.length) {
                if (i + 1 < str.length && charMap[str.substr(i, 2)]) {
                    converted += charMap[str.substr(i, 2)];
                    i += 2;
                } else if (charMap[str[i]]) {
                    converted += charMap[str[i]];
                    i++;
                } else {
                    i++;
                }
            }
            return converted.replace(/[अाइईउऊएऐओऔािीुूेैोौ ं ँ ः ृ]/g, '').replace(/श|ष/g, 'स').replace(/ज/g, 'द').replace(/ड़|ढ़|ड|थ|ट/g, 'र');
        }

        function convertHindiToSyllables(text) {
            return text.replace(/[ान ी ि ू ु े ै ो ौ ं ँ ः ृ]/g, '').replace(/[अआइईउऊएऐओऔ]/g, '').replace(/श|ष/g, 'स').replace(/ज/g, 'द').replace(/ड़|ढ़|ड|थ|ट/g, 'र');
        }

        async function loadSongs() {
            try {
                const res = await fetch('lyrics_backup.txt');
                const text = await res.text();
                parseSongs(text);
                renderSongs();
            } catch(e) {
                parseSongs("हवा में उड़ता जाए रे\nहवा में उड़ता जाए रे देखो राम दुलारा, अंजनी का लाला संकट को हरने वाला।\n---\nपायो जी मैंने राम रतन धन पायो\nपायो जी मैंने राम रतन धन पायो, वस्तु अमोलिक दी मेरे सतगुरु\n---\nकलयुग में देव सिद्ध\nकलयुग में देव सिद्ध तुम हो हनुमान");
                renderSongs();
            }
        }

        function parseSongs(text) {
            songs = [];
            const blocks = text.split('---');
            blocks.forEach(block => {
                const lines = block.trim().split('\n');
                if (lines.length > 0) {
                    const title = lines[0].trim();
                    if (title) {
                        const lyrics = lines.slice(1).join('\n').trim();
                        const searchIndex = convertHindiToSyllables((title + " " + lyrics).toLowerCase());
                        songs.push({
                            title: title,
                            lyrics: lyrics || "Lyrics उपलब्ध नहीं",
                            searchIndex: searchIndex
                        });
                    }
                }
            });
        }

        function renderSongs(filtered = songs) {
            const container = document.getElementById('songsContainer');
            container.innerHTML = '';

            if (filtered.length === 0) {
                container.innerHTML = '<div class="status-msg">कोई भजन नहीं मिला...</div>';
                return;
            }

            const sortedSongs = [...filtered].sort((a, b) => {
                const aFav = favorites.includes(a.title) ? 1 : 0;
                const bFav = favorites.includes(b.title) ? 1 : 0;
                return bFav - aFav;
            });

            sortedSongs.forEach(song => {
                const isFav = favorites.includes(song.title);
                const div = document.createElement('div');
                div.className = `song-card ${isFav ? 'is-favorite-card' : ''}`;
                div.innerHTML = `
                    <button class="heart-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite('${song.title.replace(/'/g,"\\'")}')">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.5 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                    </button>
                    <h3 class="song-title">${song.title}</h3>
                    <div class="lyrics">${song.lyrics}</div>
                    <button class="copy-btn" onclick="copyLyrics('${song.title.replace(/'/g,"\\'")}')">📋 Copy Lyrics</button>
                `;
                container.appendChild(div);
            });
        }

        function toggleFavorite(title) {
            const index = favorites.indexOf(title);
            if (index === -1) {
                favorites.push(title);
            } else {
                favorites.splice(index, 1);
            }
            localStorage.setItem('bhajan_favorites', JSON.stringify(favorites));
            filterSongs(); 
        }

        function copyLyrics(title) {
            const song = songs.find(s => s.title === title);
            if (song) {
                navigator.clipboard.writeText(song.lyrics);
                alert("✅ Lyrics Copy हो गया!");
            }
        }

        function filterSongs() {
            let term = document.getElementById('searchInput').value.trim().toLowerCase();
            
            if (!term) {
                renderSongs(songs);
                return;
            }

            const isEnglish = /^[a-zA-Z\s0-9]+$/.test(term);

            if (isEnglish) {
                const searchSoundCode = convertToHindiSyllables(term);
                const filtered = songs.filter(song => {
                    return song.title.toLowerCase().includes(term) || song.searchIndex.includes(searchSoundCode);
                });
                renderSongs(filtered);
            } else {
                const filtered = songs.filter(song => 
                    song.title.toLowerCase().includes(term) || song.lyrics.toLowerCase().includes(term)
                );
                renderSongs(filtered);
            }
        }

        // 🎙️ नया 100% फुलप्रूफ वॉयस मेथड (कीबोर्ड फ़ोर्स ट्रिगर)
        function startFullproofVoice() {
            const searchInput = document.getElementById('searchInput');
            const voiceOverlay = document.getElementById('voiceOverlay');

            // इनपुट बॉक्स को एक्टिवेट करके मोबाइल का कीबोर्ड तुरंत ऊपर उठाएं
            searchInput.focus();
            searchInput.select();

            // हेल्प गाइड दिखाएं जो यूजर को कीबोर्ड माइक दबाने का इशारा करे
            voiceOverlay.style.display = 'flex';
            
            // मोबाइल के वॉयस इनपुट के लिए हल्का सा वाइब्रेशन (यदि सपोर्टेड हो)
            if (navigator.vibrate) { navigator.vibrate(40); }
        }

        function closeOverlay() {
            document.getElementById('voiceOverlay').style.display = 'none';
            document.getElementById('searchInput').focus();
        }

        window.onload = loadSongs;
    </script>
</body>
</html>
